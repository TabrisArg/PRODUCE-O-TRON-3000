<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produce-o-tron-3000</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    body {
      background-image: url('https://i.ibb.co/YFcgH9ts/bg-stars.gif');
      background-repeat: repeat;
      font-family: 'Times New Roman', Times, serif;
      margin: 0;
      padding: 0;
    }
    .retro-beveled {
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
    }
    .retro-inset {
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #ffffff;
      border-bottom: 2px solid #ffffff;
    }
    .win95-bg {
      background-color: #c0c0c0;
    }
    .pixelated {
      image-rendering: pixelated;
    }
    /* Windows 95 Scrollbar */
    ::-webkit-scrollbar {
      width: 16px;
      height: 16px;
    }
    ::-webkit-scrollbar-track {
      background: #c0c0c0;
      background-image: linear-gradient(45deg, #dfdfdf 25%, transparent 25%, transparent 75%, #dfdfdf 75%, #dfdfdf), 
                        linear-gradient(45deg, #dfdfdf 25%, transparent 25%, transparent 75%, #dfdfdf 75%, #dfdfdf);
      background-size: 2px 2px;
      background-position: 0 0, 1px 1px;
    }
    ::-webkit-scrollbar-thumb {
      background: #c0c0c0;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      box-shadow: inset 1px 1px 0px #dfdfdf, inset -1px -1px 0px #404040;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #d0d0d0;
    }
    ::-webkit-scrollbar-corner {
      background: #c0c0c0;
    }
  </style>
</head>
<body class="p-4 md:p-8">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
